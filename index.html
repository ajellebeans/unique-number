<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Take a number</title>
<meta name="description" content="A simple tool that hands out a unique number that is never repeated.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#004238; --lime:#AADB1E; --green:#00AD50;
    --ink:#243029; --ink-soft:#5b6770; --paper:#ffffff;
    --paper-warm:#FAFAF7; --tint:#EEF3F1; --line:#E4E9E7;
    --amber:#9a6b00; --amber-bg:#fff4d6;
    --violet:#685BC7; --eggplant:#51284F;
    --sans:"Inter",-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
    --display:"Space Grotesk",var(--sans);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--paper-warm);
    display:flex; align-items:center; justify-content:center; padding:1.5rem; min-height:100%;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    background:var(--paper); width:100%; max-width:440px; border-radius:24px;
    border:1px solid var(--line); box-shadow:0 18px 50px -24px rgba(0,66,56,.28);
    padding:2.6rem 2.2rem 2.2rem; text-align:center; overflow:hidden;
  }
  .demobar{
    margin:-2.6rem -2.2rem 2rem; padding:.7rem 1rem; background:var(--amber-bg);
    color:var(--amber); font-size:.8rem; font-weight:600; line-height:1.4;
  }
  .brand{font-size:.72rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--forest); margin-bottom:.35rem;}
  .brand span{color:var(--ink-soft); font-weight:600;}
  h1{font-family:var(--display); font-weight:600; font-size:1.5rem; line-height:1.2; color:var(--forest); margin:.2rem 0 1.6rem;}

  .stage{min-height:188px; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .number{
    font-family:var(--display); font-weight:700; font-variant-numeric:tabular-nums;
    font-size:clamp(4.2rem,22vw,6rem); line-height:1; color:var(--forest); letter-spacing:-.01em;
    opacity:0; transform:translateY(8px) scale(.96);
    transition:opacity .35s ease, transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .number.show{opacity:1; transform:none;}
  .number.long{font-size:clamp(2.8rem,15vw,4.4rem);}
  .hairline{height:3px;width:48px;background:var(--lime);border-radius:2px;margin:1.1rem auto 0;opacity:0;transition:opacity .3s ease;}
  .hairline.show{opacity:1;}

  /* hold-to-copy ring */
  /* wide hold-to-take button; a colour fill sweeps across as you hold */
  .holdbar{
    position:relative; overflow:hidden; width:100%; padding:1.15rem 1.4rem;
    border:0; border-radius:16px; cursor:pointer;
    background:var(--violet); color:#fff;
    font-size:1.08rem; font-weight:600; letter-spacing:.01em; text-align:center;
    box-shadow:0 10px 24px -12px rgba(64,45,120,.55);
    -webkit-user-select:none; user-select:none; touch-action:none;
    -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
    transition:transform .12s ease;
    animation:breathe 2.6s ease-in-out infinite;
  }
  /* gentle idle "breathing" halo to invite the hold; pauses while held/done */
  @keyframes breathe{
    0%,100%{box-shadow:0 10px 24px -12px rgba(64,45,120,.55), 0 0 0 0 rgba(104,91,199,0);}
    50%{box-shadow:0 10px 26px -10px rgba(64,45,120,.55), 0 0 0 6px rgba(104,91,199,.18);}
  }
  .holdbar:active{transform:translateY(1px);}
  .holdbar.held,.holdbar.done{animation:none;}
  .holdbar:focus-visible{outline:3px solid var(--green); outline-offset:3px;}
  .holdbar .fill{
    position:absolute; left:0; top:0; bottom:0; width:100%;
    transform-origin:left; transform:scaleX(var(--p,0));
    background:linear-gradient(90deg, #3D1C3C, var(--eggplant));
  }
  .holdbar .lbl{position:relative; z-index:1; transition:opacity .2s;}
  .holdbar .lbl.nudge{opacity:.85;}
  .copybtn{
    margin-top:1.1rem; display:inline-flex; align-items:center; gap:.5rem;
    padding:.7rem 1.3rem; border:1px solid var(--line); border-radius:999px;
    background:var(--paper); color:var(--forest); font-size:.95rem; font-weight:600;
    transition:background .2s, border-color .2s, color .2s, transform .12s ease;
  }
  .copybtn:hover{background:var(--tint);}
  .copybtn:active{transform:translateY(1px);}
  .copybtn.copied{background:var(--green); border-color:var(--green); color:#fff;}
  .copybtn:focus-visible{outline:3px solid var(--green); outline-offset:2px;}

  /* respect users who ask for less motion: drop the pulse and the number's
     slide/scale (keep the ring fill, which is essential progress feedback) */
  @media (prefers-reduced-motion: reduce){
    .holdbar{animation:none;}
    .number, .number.show{transition:opacity .2s ease; transform:none;}
    .spinner{animation-duration:1.4s;}
  }
  .placeholder{color:var(--ink-soft); font-size:1rem;}
  .spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--tint);border-top-color:var(--green);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error{color:#b3261e; font-size:1rem; line-height:1.5; max-width:18rem;}
  .error b{display:block; font-weight:700; margin-bottom:.2rem;}

  .actions{margin-top:1.8rem;}
  button{font-family:var(--sans); cursor:pointer;}
  .primary{
    width:100%; padding:1.15rem 1.4rem; border:0; border-radius:16px;
    background:var(--forest); color:#fff; font-size:1.12rem; font-weight:600; letter-spacing:.01em;
    transition:transform .12s ease, background .2s ease; box-shadow:0 10px 24px -12px rgba(0,66,56,.6);
  }
  .primary:hover{background:#013128;}
  .primary:active{transform:translateY(1px);}
  .primary:disabled{background:var(--ink-soft); box-shadow:none; cursor:default; opacity:.7;}
  .secondary{margin-top:.8rem; width:100%; padding:.85rem; border:1px solid var(--line); border-radius:14px; background:var(--paper); color:var(--forest); font-size:.98rem; font-weight:600;}
  .secondary:hover{background:var(--tint);}
  .hidden{display:none !important;}

  .demo{margin-top:1.4rem; font-size:.72rem;}
  .demo a{color:var(--ink-soft); text-decoration:underline; cursor:pointer;}
</style>
</head>
<body>
  <main class="card">
    <div id="demobar" class="demobar hidden">Demo mode: not connected to the live counter yet. These numbers are practice only.</div>
    <div class="brand">RDP <span>&middot; Centre of Teaching, Learning &amp; Scholarship</span></div>
    <h1>Take a number</h1>

    <div class="stage" aria-live="polite">
      <div id="placeholder" class="placeholder">Your number will appear here.</div>
      <div id="spinner" class="spinner hidden" role="status" aria-label="Getting your number"></div>
      <div id="numberWrap" class="hidden">
        <div id="number" class="number"></div>
        <div class="hairline" id="hairline"></div>
        <button id="copyBtn" class="copybtn" type="button">
          <span id="copyBtnGlyph">&#9109;</span> <span id="copyBtnText">Copy number</span>
        </button>
      </div>
      <div id="error" class="error hidden"><b>Couldn't reach the server.</b>No number was given out, so nothing is lost. Please try again.</div>
    </div>

    <div class="actions">
      <button id="holdBtn" class="holdbar" aria-label="Press and hold for half a second to take a number">
        <span class="fill"></span>
        <span class="lbl" id="holdLabel">Hold to take a number</span>
      </button>
    </div>

    <div id="demoControls" class="demo hidden"><a id="demoToggle">demo: simulate a server error</a></div>
  </main>

<script>
/* =====================================================================
 *  CONFIGURATION  --  the only thing you need to edit to go live.
 *  Paste the deployed counter URL between the quotes below.
 *  While it is empty, the page runs in safe "demo mode" (practice only).
 * ===================================================================== */
const ENDPOINT = "https://script.google.com/macros/s/AKfycbxP5anaypfKcqFuRqyX_Em335YdvXg-wS-DxEpTIJpts4TewvvrzzV1xkjagIMfJ0LVBA/exec";
const START    = 4000; // first number ever handed out (must match the counter)

/* ----------------------------------------------------------------- */
const DEMO = !ENDPOINT;
const $ = s => document.querySelector(s);
const placeholder=$("#placeholder"), spinner=$("#spinner"),
      numberWrap=$("#numberWrap"), numberEl=$("#number"),
      hairline=$("#hairline"), errorEl=$("#error"),
      holdBtn=$("#holdBtn"), holdLabel=$("#holdLabel"),
      copyBtn=$("#copyBtn"), copyBtnGlyph=$("#copyBtnGlyph"), copyBtnText=$("#copyBtnText");

if(DEMO){ $("#demobar").classList.remove("hidden"); $("#demoControls").classList.remove("hidden"); }

async function getNext(){
  if(DEMO){
    await new Promise(r=>setTimeout(r,500));
    if(window.__forceError) throw new Error("demo offline");
    let n = parseInt(localStorage.getItem("una_demo_next")||START,10);
    localStorage.setItem("una_demo_next", n+1);
    return n;
  }
  // Live: a "simple" POST (text/plain) so the browser sends no CORS preflight.
  const res = await fetch(ENDPOINT,{method:"POST",body:"get"});
  if(!res.ok) throw new Error("bad response "+res.status);
  const data = await res.json();
  if(typeof data.number!=="number") throw new Error("unexpected response");
  return data.number;
}

function showState(s){
  placeholder.classList.toggle("hidden", s!=="idle");
  spinner.classList.toggle("hidden", s!=="loading");
  numberWrap.classList.toggle("hidden", s!=="result");
  errorEl.classList.toggle("hidden", s!=="error");
}
async function copy(t){try{await navigator.clipboard.writeText(t);return true;}catch(e){/* clipboard can be blocked; not critical */return false;}}

/* The reliable copy path: a real button CLICK is its own user gesture, so
   navigator.clipboard.writeText succeeds even on Safari/iOS (where the async
   auto-copy after the hold + fetch falls outside the gesture window). */
function resetCopyBtn(){
  copyBtn.classList.remove("copied");
  copyBtnGlyph.innerHTML="&#9109;"; copyBtnText.textContent="Copy number";
}
function markCopied(){
  copyBtn.classList.add("copied");
  copyBtnGlyph.innerHTML="&#10003;"; copyBtnText.textContent="Copied";
}
copyBtn.addEventListener("click",async ()=>{
  if(!currentNumber) return;
  if(await copy(currentNumber)) markCopied();
});

/* ---- hold-to-get: ONE gesture allocates the number AND copies it.
   The number is only fetched when the hold COMPLETES, so releasing early
   burns nothing from the counter. Hold length = HOLD_MS. ---- */
const HOLD_MS=500;
let currentNumber="", holdRaf=null, holdStart=0, busy=false, hasNumber=false;
function setP(p){holdBtn.style.setProperty("--p",p);}
function idleLabel(){
  holdLabel.textContent = hasNumber ? "Hold to take another number" : "Hold to take a number";
  holdLabel.classList.remove("nudge","done");
}
function armIdle(){
  busy=false; setP(0);
  holdBtn.classList.remove("done","held");
}
function frame(now){
  if(!holdStart) holdStart=now;
  const p=Math.min((now-holdStart)/HOLD_MS,1);
  setP(p);
  if(p>=1){complete();return;}
  holdRaf=requestAnimationFrame(frame);
}
function begin(e){
  if(busy) return;
  if(e&&e.preventDefault) e.preventDefault();
  // Pointer capture keeps events on the button if the finger/cursor drifts off
  // the small ring mid-hold, so a slight wobble doesn't cancel the hold.
  if(e&&e.pointerId!=null&&holdBtn.setPointerCapture){try{holdBtn.setPointerCapture(e.pointerId);}catch(_){}}
  holdBtn.classList.add("held");
  holdStart=0; cancelAnimationFrame(holdRaf);
  holdLabel.textContent="Keep holding…"; holdLabel.classList.remove("nudge","done");
  holdRaf=requestAnimationFrame(frame);
}
function cancel(){
  if(busy) return;
  cancelAnimationFrame(holdRaf);
  holdBtn.classList.remove("held");
  const reached=parseFloat(getComputedStyle(holdBtn).getPropertyValue("--p"))||0;
  setP(0);
  if(reached>0.05&&reached<1){holdLabel.textContent="Hold a little longer"; holdLabel.classList.add("nudge");}
  else{ idleLabel(); }
}
async function complete(){
  busy=true; setP(1); cancelAnimationFrame(holdRaf);
  holdBtn.classList.add("done");
  holdLabel.textContent="Getting your number…"; holdLabel.classList.remove("nudge","done");
  numberEl.classList.remove("show"); hairline.classList.remove("show");
  resetCopyBtn();
  showState("loading");
  try{
    const n=await getNext();
    currentNumber=String(n);
    numberEl.textContent=n;
    numberEl.classList.toggle("long", currentNumber.length>=6);
    showState("result");
    requestAnimationFrame(()=>{numberEl.classList.add("show"); hairline.classList.add("show");});
    hasNumber=true;
    holdLabel.textContent="Your number is ready"; holdLabel.classList.add("done");
    // Convenience auto-copy for browsers that allow it (Chrome). If it fails
    // (Safari/iOS), the "Copy number" button is the reliable fallback.
    if(await copy(currentNumber)) markCopied();
    setTimeout(()=>{armIdle(); idleLabel();}, 2200);
  }catch(e){
    showState("error");
    armIdle();
    holdLabel.textContent="Couldn’t reach the server. Hold to try again.";
    holdLabel.classList.remove("done");
  }
}
holdBtn.addEventListener("pointerdown",begin);
holdBtn.addEventListener("pointerup",cancel);
holdBtn.addEventListener("pointerleave",cancel);
holdBtn.addEventListener("pointercancel",cancel);
holdBtn.addEventListener("contextmenu",e=>e.preventDefault());
holdBtn.addEventListener("keydown",e=>{if((e.key==="Enter"||e.key===" ")&&!e.repeat){e.preventDefault();begin(e);}});
holdBtn.addEventListener("keyup",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();cancel();}});
if(DEMO){
  $("#demoToggle").addEventListener("click",()=>{
    window.__forceError=!window.__forceError;
    $("#demoToggle").textContent=window.__forceError?"demo: error mode ON (tap to turn off)":"demo: simulate a server error";
  });
}
</script>
</body>
</html>
